name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Core tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=minimal"

  smoke:
    name: Headless runner smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run default scenario (500 ticks)
        run: |
          dotnet run --project src/Loopolis.Runner --configuration Release -- 500 default \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          ticks     = d.get('tick', d.get('TotalTicks', 0))
          game_state = d.get('gameState', d.get('GameState', ''))
          print(f'Scenario : {d[\"Scenario\"]}')
          print(f'Ticks    : {ticks}')
          print(f'Survived : {d[\"Survived\"]}')
          print(f'GameState: {game_state}')
          assert d['Survived'] == True, 'Smoke test failed: city did not survive'
          assert game_state not in ('Bankrupt', 'Abandoned'), f'Bad end state: {game_state}'
          print('OK')
          "

      - name: Run metro_test scenario (200 ticks — verify Metropolis milestone reachable)
        run: |
          dotnet run --project src/Loopolis.Runner --configuration Release -- 200 metro_test \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          pop = d.get('population', d.get('FinalPopulation', 0))
          state = d.get('GameState', d.get('gameState', ''))
          print(f'Population: {pop}')
          print(f'GameState : {state}')
          assert pop > 0, 'Smoke test failed: zero population'
          assert state not in ('Bankrupt', 'Abandoned'), f'Bad end state: {state}'
          print('OK')
          "
